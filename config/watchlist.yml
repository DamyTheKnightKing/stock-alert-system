# Stock Alert System — Watchlist Configuration
# ETF-first strategy: always include broad market ETFs as baseline

watchlist:
  # --- Broad Market ETFs (always watch) ---
  - symbol: SPY
    name: "S&P 500 ETF"
    type: ETF
    priority: high

  - symbol: QQQ
    name: "Nasdaq-100 ETF"
    type: ETF
    priority: high

  # --- Macro / Risk Barometers ---
  - symbol: GLD
    name: "Gold ETF"
    type: ETF
    priority: high


  # --- Individual Stocks (strong alpha candidates only) ---
  - symbol: NVDA
    name: "NVIDIA Corporation"
    type: stock
    priority: high
