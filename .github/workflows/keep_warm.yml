name: Keep API Warm

on:
  schedule:
    - cron: "*/14 * * * *"   # every 14 minutes (~3,000 runs/month — within free tier)
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping API
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            https://stock-alert-system-tods.onrender.com/ | grep -q "200" \
            && echo "API is warm" || echo "API returned non-200"
