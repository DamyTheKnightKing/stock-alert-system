name: Keep API Warm

on:
  schedule:
    #- cron: "*/30 9-21 * * 1-5"   # every 30 min, 9AM-9PM ET weekdays only (~360 runs/month)
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping API
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            https://stock-alert-system-tods.onrender.com/ | grep -q "200" \
            && echo "API is warm" || echo "API returned non-200"
